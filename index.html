<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Follow-Up Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Figtree', sans-serif;
  background: #f4f7fb;
}

header {
  background: linear-gradient(135deg, #082b5f, #006b6f);
  color: white;
  padding: 30px;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 32px;
}

.container {
  max-width: 1100px;
  margin: 30px auto;
  padding: 20px;
}

.zone-card {
  background: white;
  border-radius: 20px;
  margin-bottom: 25px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.zone-title {
  padding: 20px;
  font-size: 24px;
  font-weight: 800;
  color: white;
  text-align: center;
}

.az1 { background:#082b5f; }
.az2 { background:#006b6f; }
.bz2 { background:#56318d; }

.section {
  padding: 20px;
}

.section-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 10px;
  color: #555;
}

.item {
  padding: 12px 0;
  border-bottom: 1px solid #eee;
  font-size: 18px;
  font-weight: 600;
}

.item:last-child {
  border-bottom: none;
}

footer {
  text-align:center;
  padding:20px;
  background:#10233f;
  color:white;
}

</style>
</head>

<body>

<header>
  <h1>FOLLOW-UP DOCTOR DIRECTORY</h1>
</header>

<div class="container" id="directory"></div>

<footer>
Need help? Please approach our staff.
</footer>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqbhQEodWD8thq2skUS_ky52tR7iRye1qLdVQyEz9NAB5vvJmy5kH8OTtA0yrNIhT9__V8yBwbzmAG/pub?output=csv";

const zones = [
  {name:"OPD A Zone 1", class:"az1"},
  {name:"OPD A Zone 2", class:"az2"},
  {name:"OPD B Zone 2", class:"bz2"}
];

function isDoctor(name){
  return name.toLowerCase().includes("dr") ||
         name.toLowerCase().includes("dato") ||
         name.toLowerCase().includes("prof");
}

async function loadData(){
  const res = await fetch(SHEET_URL + "&t=" + Date.now());
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows.shift();

  const data = rows.map(r=>{
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = r[i]);
    return obj;
  });

  render(data);
}

function render(data){
  const container = document.getElementById("directory");
  container.innerHTML = "";

  zones.forEach(z => {

    const zoneData = data.filter(d =>
      d["Zone"] && d["Zone"].includes(z.name) &&
      d["Status"] === "Active"
    );

    const doctors = zoneData.filter(d => isDoctor(d["Doctor/Clinic Name"]));
    const clinics = zoneData.filter(d => !isDoctor(d["Doctor/Clinic Name"]));

    const card = document.createElement("div");
    card.className = "zone-card";

    card.innerHTML = `
      <div class="zone-title ${z.class}">${z.name}</div>

      <div class="section">
        <div class="section-title">Doctors</div>
        ${doctors.map(d => `<div class="item">${d["Doctor/Clinic Name"]}</div>`).join("")}
      </div>

      <div class="section">
        <div class="section-title">Clinics & Services</div>
        ${clinics.map(d => `<div class="item">${d["Doctor/Clinic Name"]}</div>`).join("")}
      </div>
    `;

    container.appendChild(card);
  });
}

loadData();

</script>

</body>
</html>
