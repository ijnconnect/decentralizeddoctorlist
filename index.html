<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Follow-Up Doctor Directory</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      color: #0b1f3a;
    }

    header {
      background: linear-gradient(135deg, #003b71, #006b5f);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin: 10px 0 0;
      font-size: 18px;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .notice {
      background: #fff7e6;
      border-left: 6px solid #c99a2e;
      padding: 16px 20px;
      margin-bottom: 25px;
      border-radius: 10px;
      font-size: 17px;
    }

    .zone-card {
      background: white;
      border-radius: 18px;
      margin-bottom: 28px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .zone-title {
      color: white;
      padding: 18px 24px;
      font-size: 24px;
      font-weight: bold;
    }

    .az1 { background: #003b71; }
    .az2 { background: #006b5f; }
    .bz2 { background: #5b2c83; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 20px;
    }

    th {
      background: #eef5f3;
      text-align: left;
      padding: 16px;
      color: #063f34;
    }

    td {
      padding: 18px 16px;
      border-bottom: 1px solid #e5e5e5;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .room {
      font-weight: bold;
      color: #003b71;
    }

    .empty {
      padding: 20px;
      color: #777;
      font-size: 18px;
    }

    .last-updated {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 25px;
      background: #0b1f3a;
      color: white;
      margin-top: 40px;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 25px;
      }

      header p {
        font-size: 15px;
      }

      table {
        font-size: 16px;
      }

      th, td {
        padding: 12px;
      }

      .zone-title {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>FOLLOW-UP DOCTOR DIRECTORY</h1>
    <p>Please check your doctor, zone and clinic room before proceeding.</p>
  </header>

  <div class="container">
    <div class="notice">
      Doctor locations may change daily. Kindly confirm your details before proceeding.
    </div>

    <div id="directory">Loading doctor directory...</div>

    <div class="last-updated" id="lastUpdated"></div>
  </div>

  <footer>
    Need assistance? Please approach our staff. Thank you for your cooperation.
  </footer>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqbhQEodWD8thq2skUS_ky52tR7iRye1qLdVQyEz9NAB5vvJmy5kH8OTtA0yrNIhT9__V8yBwbzmAG/pub?output=csv";

    const zones = [
      {
        name: "OPD A Zone 1",
        className: "az1",
        aliases: ["OPD A Zone 1", "AZ1", "A Zone 1"]
      },
      {
        name: "OPD A Zone 2",
        className: "az2",
        aliases: ["OPD A Zone 2", "AZ2", "A Zone 2"]
      },
      {
        name: "OPD B Zone 2",
        className: "bz2",
        aliases: ["OPD B Zone 2", "BZ2", "B Zone 2"]
      }
    ];

    async function loadDirectory() {
      try {
        const response = await fetch(SHEET_CSV_URL + "&cacheBust=" + Date.now());
        const csvText = await response.text();
        const data = parseCSV(csvText);

        const activeDoctors = data.filter(row =>
          clean(row["Status"]).toLowerCase() === "active"
        );

        renderDirectory(activeDoctors);

        document.getElementById("lastUpdated").innerText =
          "Last updated: " + new Date().toLocaleString("en-MY");

      } catch (error) {
        document.getElementById("directory").innerHTML =
          "<p>Unable to load doctor directory. Please contact staff for assistance.</p>";
      }
    }

    function clean(value) {
      return value ? value.trim() : "";
    }

    function parseCSV(text) {
      const rows = text.trim().split(/\r?\n/).map(row => parseCSVRow(row));
      const headers = rows.shift().map(header => clean(header));

      return rows.map(row => {
        let obj = {};
        headers.forEach((header, index) => {
          obj[header] = clean(row[index]);
        });
        return obj;
      });
    }

    function parseCSVRow(row) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < row.length; i++) {
        const char = row[i];

        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function matchesZone(rowZone, zone) {
      const cleanedRowZone = clean(rowZone).toLowerCase();

      return zone.aliases.some(alias =>
        cleanedRowZone === alias.toLowerCase()
      );
    }

    function renderDirectory(data) {
      const container = document.getElementById("directory");
      container.innerHTML = "";

      zones.forEach(zone => {
        const doctors = data.filter(row => matchesZone(row["Zone"], zone));

        const card = document.createElement("div");
        card.className = "zone-card";

        card.innerHTML = `
          <div class="zone-title ${zone.className}">${zone.name}</div>
          ${
            doctors.length > 0
              ? `
                <table>
                  <thead>
                    <tr>
                      <th>Doctor's Name</th>
                      <th>Room</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${doctors.map(doc => `
                      <tr>
                        <td>${doc["Doctor Name"] || "-"}</td>
                        <td class="room">${doc["Room"] || "-"}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              `
              : `<div class="empty">No doctor listed for this zone at the moment.</div>`
          }
        `;

        container.appendChild(card);
      });
    }

    loadDirectory();

    // Auto refresh every 5 minutes
    setInterval(loadDirectory, 300000);
  </script>

</body>
</html>
